name: Documentation

on:
  push:
    branches:
      - master
    tags: '*'
  pull_request:

jobs:
  build:
    permissions:
      # Needed to allow julia-actions/cache to delete old caches that it has created: https://github.com/julia-actions/cache#usage
      actions: write
      # contents: read  # The write permission used later includes this
      # Needed to successfully use Documenter.deploydocs: https://documenter.juliadocs.org/stable/man/hosting/#Permissions
      contents: write  # Required when authenticating with `GITHUB_TOKEN`, not needed when authenticating with SSH deploy keys
      pull-requests: read  # Required when using `push_preview=true`
      statuses: write  # Optional, used to report documentation build statuses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1' # Latest v1 release of Julia
      - uses: julia-actions/cache@v3
      - name: Install dependencies
        shell: julia --color=yes --project=docs {0}
        run: |
          using Pkg
          Pkg.develop(PackageSpec(path=pwd()))
          Pkg.instantiate()
      - name: Build and deploy
        run: julia --color=yes --project=docs docs/make.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Required for deploying preview documentation from PRs
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
